  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

10-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"59927950-2cb8-4760-ae31-00d96326d3af\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0cbfa540-71a9-433f-9544-e9fcc5cb4327\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{background:#15130f}\n  ::selection{background:rgba(134,169,140,.32)}\n  @keyframes tipin{from{opacity:0;transform:translateX(-50%) translateY(-4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  .bx-scroll::-webkit-scrollbar{height:13px;width:13px}\n  .bx-scroll::-webkit-scrollbar-track{background:#15130f}\n  .bx-scroll::-webkit-scrollbar-thumb{background:#3a352c;border-radius:7px;border:3px solid #15130f}\n  .bx-scroll::-webkit-scrollbar-thumb:hover{background:#4c463a}\n  /* Mobile-friendly overrides. The table uses a JS-driven card layout below\n     this breakpoint; these rules reflow the header + filter bar to match. */\n  @media (max-width:760px){\n    .mc-page{padding:16px 12px 56px !important}\n    .mc-header{gap:10px !important; padding-bottom:16px !important; margin-bottom:18px !important}\n    .mc-title{font-size:28px !important}\n    .mc-source{text-align:left !important; max-width:none !important}\n    .mc-filters{gap:11px !important}\n    .mc-searchwrap{flex:1 1 100% !important; width:100% !important}\n    .mc-search{width:100% !important}\n    .mc-panel{width:calc(100vw - 32px) !important; max-width:340px !important}\n    .mc-spacer{display:none !important}\n    .mc-count{order:-1}\n    .mc-legend{padding-left:0 !important; border-left:none !important; flex-wrap:wrap; row-gap:7px}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"mc-page\" style=\"--acc: {{ accent }}; min-height:100vh; background:#15130f; color:#f3efe6; font-family:'Archivo',system-ui,sans-serif; padding:30px 30px 70px\">\n  <div style=\"max-width:1340px; margin:0 auto\">\n\n    <div class=\"mc-header\" style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap; border-bottom:1px solid rgba(255,255,255,.09); padding-bottom:22px; margin-bottom:24px\">\n      <div>\n        <div style=\"font:700 12px/1 'Space Mono',monospace; letter-spacing:.24em; text-transform:uppercase; color:var(--acc,#86a98c); margin-bottom:13px\">Trim Comparison<\u002Fdiv>\n        <h1 class=\"mc-title\" style=\"margin:0; font:800 40px/1 'Archivo',sans-serif; letter-spacing:-.025em\">2026 Ford Bronco<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"mc-source\" style=\"font:400 12px/1.6 'Space Mono',monospace; color:#8c8475; text-align:right; max-width:280px\">{{ sourceLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ notReady }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; align-items:center; gap:13px; padding:60px 0; color:#8c8475; font:400 13px 'Space Mono',monospace\">\n        <span style=\"display:inline-block; width:16px; height:16px; border:2px solid #3a352c; border-top-color:var(--acc,#86a98c); border-radius:50%; animation:spin .8s linear infinite\"><\u002Fspan>\n        Loading lineup…\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ ready }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n\n        <div style=\"margin-bottom:22px\">\n          <div style=\"font:700 11px 'Space Mono',monospace; letter-spacing:.18em; text-transform:uppercase; color:#7d7567; margin-bottom:11px\">Compare trims · tap to add or remove<\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:9px\">\n            <sc-for list=\"{{ allTrims }}\" as=\"t\" hint-placeholder-count=\"7\">\n              <sc-if value=\"{{ t.selected }}\">\n                <button onclick=\"{{ t.toggle }}\" style=\"display:flex; flex-direction:column; align-items:flex-start; gap:3px; padding:9px 14px; border-radius:9px; cursor:pointer; border:1.5px solid var(--acc,#86a98c); background:rgba(255,255,255,.055); color:#f3efe6; text-align:left; font-family:'Archivo',sans-serif\">\n                  <span style=\"display:flex; align-items:center; gap:7px; font:700 14px 'Archivo',sans-serif\"><span style=\"display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:50%; background:var(--acc,#86a98c); color:#15130f; font:700 10px 'Space Mono',monospace\">✓<\u002Fspan>{{ t.name }}<\u002Fspan>\n                  <span style=\"font:400 11px 'Space Mono',monospace; color:#a39a8b\">{{ t.price }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ t.unselected }}\">\n                <button onclick=\"{{ t.toggle }}\" style=\"display:flex; flex-direction:column; align-items:flex-start; gap:3px; padding:9px 14px; border-radius:9px; cursor:pointer; border:1.5px solid rgba(255,255,255,.12); background:transparent; color:#a39a8b; text-align:left; font-family:'Archivo',sans-serif\" style-hover=\"border-color:rgba(255,255,255,.3); color:#e7e1d6\">\n                  <span style=\"font:600 14px 'Archivo',sans-serif\">{{ t.name }}<\u002Fspan>\n                  <span style=\"font:400 11px 'Space Mono',monospace; color:#7d7567\">{{ t.price }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"mc-filters\" style=\"display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:16px\">\n          <div style=\"display:inline-flex; padding:3px; border-radius:9px; background:#211d16; border:1px solid rgba(255,255,255,.08)\">\n            <sc-if value=\"{{ modeAll }}\"><span style=\"padding:7px 15px; border-radius:7px; background:var(--acc,#86a98c); color:#15130f; font:700 12.5px 'Archivo',sans-serif; cursor:default\">All features<\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ modeAllOff }}\"><button onclick=\"{{ setAll }}\" style=\"padding:7px 15px; border-radius:7px; background:transparent; border:none; color:#a39a8b; font:600 12.5px 'Archivo',sans-serif; cursor:pointer\">All features<\u002Fbutton><\u002Fsc-if>\n            <sc-if value=\"{{ modeDiff }}\"><span style=\"padding:7px 15px; border-radius:7px; background:var(--acc,#86a98c); color:#15130f; font:700 12.5px 'Archivo',sans-serif; cursor:default\">Only differences<\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ modeDiffOff }}\"><button onclick=\"{{ setDiff }}\" style=\"padding:7px 15px; border-radius:7px; background:transparent; border:none; color:#a39a8b; font:600 12.5px 'Archivo',sans-serif; cursor:pointer\">Only differences<\u002Fbutton><\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div class=\"mc-searchwrap\" style=\"position:relative; display:flex; align-items:center\">\n            <span style=\"position:absolute; left:11px; color:#6f675b; font:400 13px 'Space Mono',monospace; pointer-events:none\">⌕<\u002Fspan>\n            <input class=\"mc-search\" value=\"{{ search }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search features…\" style=\"width:230px; padding:8px 28px 8px 28px; border-radius:8px; background:#1b1813; border:1px solid rgba(255,255,255,.1); color:#f3efe6; font:400 13px 'Archivo',sans-serif; outline:none\" style-focus=\"border-color:var(--acc,#86a98c)\">\n            <sc-if value=\"{{ hasSearch }}\"><button onclick=\"{{ clearSearch }}\" style=\"position:absolute; right:8px; background:none; border:none; color:#8c8475; cursor:pointer; font:400 15px 'Archivo',sans-serif; padding:0 3px\">×<\u002Fbutton><\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"position:relative\">\n            <button onclick=\"{{ togglePanel }}\" style=\"display:inline-flex; align-items:center; gap:8px; padding:8px 13px; border-radius:8px; background:#1b1813; border:1px solid rgba(255,255,255,.1); color:#cfc8ba; font:600 12.5px 'Archivo',sans-serif; cursor:pointer\" style-hover=\"border-color:rgba(255,255,255,.28)\">\n              <span>Sections<\u002Fspan>\n              <sc-if value=\"{{ hasHidden }}\"><span style=\"display:inline-flex; align-items:center; justify-content:center; min-width:17px; height:17px; padding:0 5px; border-radius:9px; background:var(--acc,#86a98c); color:#15130f; font:700 10px 'Space Mono',monospace\">{{ hiddenCount }}<\u002Fspan><\u002Fsc-if>\n              <span style=\"font:400 9px 'Space Mono',monospace; color:#8c8475\">▾<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ panelOpen }}\">\n              <div onclick=\"{{ closePanel }}\" style=\"position:fixed; inset:0; z-index:55\"><\u002Fdiv>\n              <div class=\"bx-scroll mc-panel\" style=\"position:absolute; top:calc(100% + 9px); left:0; z-index:60; width:330px; max-height:60vh; overflow:auto; background:#201c15; border:1px solid rgba(255,255,255,.15); border-radius:12px; box-shadow:0 20px 54px rgba(0,0,0,.62); padding:10px\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; padding:4px 6px 10px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:6px\">\n                  <span style=\"font:700 11px 'Space Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:#8c8475\">Show / hide sections<\u002Fspan>\n                  <button onclick=\"{{ showAllSections }}\" style=\"background:none; border:none; color:var(--acc,#86a98c); font:600 11px 'Archivo',sans-serif; cursor:pointer; padding:2px 4px\">Show all<\u002Fbutton>\n                <\u002Fdiv>\n                <sc-for list=\"{{ panelSections }}\" as=\"ps\" hint-placeholder-count=\"5\">\n                  <div style=\"margin-bottom:2px\">\n                    <div onclick=\"{{ ps.toggle }}\" style=\"display:flex; align-items:center; gap:9px; padding:7px 6px; border-radius:7px; cursor:pointer\" style-hover=\"background:rgba(255,255,255,.04)\">\n                      <sc-if value=\"{{ ps.catChecked }}\"><span style=\"display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:4px; background:var(--acc,#86a98c); color:#15130f; font:700 10px 'Space Mono',monospace; flex:none\">✓<\u002Fspan><\u002Fsc-if>\n                      <sc-if value=\"{{ ps.catUnchecked }}\"><span style=\"width:16px; height:16px; border-radius:4px; border:1.5px solid rgba(255,255,255,.25); flex:none\"><\u002Fspan><\u002Fsc-if>\n                      <span style=\"font:700 13px 'Archivo',sans-serif; color:#f3efe6\">{{ ps.cat }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <sc-if value=\"{{ ps.hasSubs }}\">\n                      <div style=\"padding-left:11px\">\n                        <sc-for list=\"{{ ps.subs }}\" as=\"sub\" hint-placeholder-count=\"3\">\n                          <div onclick=\"{{ sub.toggle }}\" style=\"display:flex; align-items:center; gap:9px; padding:5px 6px 5px 14px; border-radius:6px; cursor:pointer; border-left:1px solid rgba(255,255,255,.07)\" style-hover=\"background:rgba(255,255,255,.035)\">\n                            <sc-if value=\"{{ sub.checked }}\"><span style=\"display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:3px; background:rgba(134,169,140,.85); color:#15130f; font:700 9px 'Space Mono',monospace; flex:none\">✓<\u002Fspan><\u002Fsc-if>\n click=\"{{ row.toggle }}\" style=\"background:#1a1711; border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer\" style-hover=\"background:#1e1a13\">\n                          <div style=\"position:sticky; left:0; display:inline-flex; align-items:center; gap:9px; padding:8px 16px 8px 30px\">\n                            <span style=\"display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; color:#9a9182; font:700 12px 'Space Mono',monospace\">{{ row.chevron }}<\u002Fspan>\n                            <span style=\"font:700 11px 'Space Mono',monospace; letter-spacing:.15em; text-transform:uppercase; color:#9a9182\">{{ row.label }}<\u002Fspan>\n                            <sc-if value=\"{{ row.hasGloss }}\"><span onmouseenter=\"{{ row.tipEnter }}\" onmouseleave=\"{{ tipLeave }}\" style=\"display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:50%; border:1px solid rgba(255,255,255,.24); color:#9a9182; font:700 8px 'Space Mono',monospace; cursor:help; flex:none\">?<\u002Fspan><\u002Fsc-if>\n                            <span style=\"font:400 10px 'Space Mono',monospace; color:#6f675b; margin-left:2px\">{{ row.countLabel }}<\u002Fspan>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n\n                      <sc-if value=\"{{ row.isFeature }}\">\n                        <div style=\"display:flex; border-bottom:1px solid rgba(255,255,255,.05); min-height:46px\">\n                          <div style=\"flex:0 0 300px; width:300px; position:sticky; left:0; z-index:5; background:#17150f; padding:9px 16px 9px 42px; border-right:1px solid rgba(255,255,255,.07); display:flex; align-items:center; gap:7px\">\n                            <sc-if value=\"{{ row.diffHi }}\"><span style=\"position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--acc,#86a98c)\"><\u002Fspan><\u002Fsc-if>\n                            <span style=\"font:500 13.5px/1.32 'Archivo',sans-serif; color:#e7e1d6\">{{ row.name }}<\u002Fspan>\n                            <sc-if value=\"{{ row.hasGloss }}\"><span onmouseenter=\"{{ row.tipEnter }}\" onmouseleave=\"{{ tipLeave }}\" style=\"display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:50%; border:1px solid rgba(255,255,255,.28); color:#b9b1a2; font:700 9px 'Space Mono',monospace; cursor:help; flex:none\">?<\u002Fspan><\u002Fsc-if>\n                          <\u002Fdiv>\n                          <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"3\">\n                            <div style=\"flex:0 0 168px; width:168px; border-right:1px solid rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; padding:9px 10px; text-align:center\">\n                              <sc-if value=\"{{ cell.std }}\"><span style=\"display:inline-flex; align-items:center; gap:5px; font:700 10px 'Space Mono',monospace; letter-spacing:.07em; text-transform:uppercase; color:#a9ccae; background:rgba(134,169,140,.14); border:1px solid rgba(134,169,140,.32); padding:4px 9px; border-radius:6px\">✓ Standard<\u002Fspan><\u002Fsc-if>\n                              <sc-if value=\"{{ cell.opt }}\"><span style=\"display:inline-flex; align-items:center; gap:5px; font:700 10px 'Space Mono',monospace; letter-spacing:.07em; text-transform:uppercase; color:#e6c486; background:rgba(216,166,87,.12); border:1px solid rgba(216,166,87,.32); padding:4px 9px; border-radius:6px\">Optional<\u002Fspan><\u002Fsc-if>\n                              <sc-if value=\"{{ cell.na }}\"><span style=\"color:#5f574b; font:400 17px 'Space Mono',monospace; line-height:1\">—<\u002Fspan><\u002Fsc-if>\n                            <\u002Fdiv>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ tableMobile }}\">\n          <div>\n            <sc-if value=\"{{ diffNeedsMore }}\">\n              <div style=\"border:1px dashed rgba(255,255,255,.14); border-radius:10px; padding:34px 18px; text-align:center; color:#8c8475; font:400 13.5px 'Archivo',sans-serif\">Pick at least two trims to see what's different.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ showRows }}\">\n              <div style=\"display:flex; flex-direction:column; gap:9px\">\n                <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"12\">\n\n                  <sc-if value=\"{{ row.isCategory }}\">\n                    <div onclick=\"{{ row.toggle }}\" style=\"display:flex; align-items:center; gap:10px; padding:13px 14px; background:#221e16; border:1px solid rgba(255,255,255,.08); border-radius:10px; cursor:pointer; margin-top:5px\">\n                      <span style=\"display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; color:var(--acc,#86a98c); font:700 15px 'Space Mono',monospace; flex:none\">{{ row.chevron }}<\u002Fspan>\n                      <span style=\"flex:1; font:700 15px 'Archivo',sans-serif; letter-spacing:.01em; color:#f3efe6\">{{ row.label }}<\u002Fspan>\n                      <sc-if value=\"{{ row.hasGloss }}\"><span onmouseenter=\"{{ row.tipEnter }}\" onmouseleave=\"{{ tipLeave }}\" style=\"display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; border:1px solid rgba(255,255,255,.28); color:#b9b1a2; font:700 10px 'Space Mono',monospace; cursor:help; flex:none\">?<\u002Fspan><\u002Fsc-if>\n                      <span style=\"font:400 11px 'Space Mono',monospace; color:#7d7567; flex:none\">{{ row.countLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                  <sc-if value=\"{{ row.isSub }}\">\n                    <div onclick=\"{{ row.toggle }}\" style=\"display:flex; align-items:center; gap:9px; padding:9px 13px; background:#1a1711; border:1px solid rgba(255,255,255,.05); border-radius:8px; cursor:pointer\">\n                      <span style=\"display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; color:#9a9182; font:700 12px 'Space Mono',monospace; flex:none\">{{ row.chevron }}<\u002Fspan>\n                      <span style=\"flex:1; font:700 11px 'Space Mono',monospace; letter-spacing:.15em; text-transform:uppercase; color:#9a9182\">{{ row.label }}<\u002Fspan>\n                      <sc-if value=\"{{ row.hasGloss }}\"><span onmouseenter=\"{{ row.tipEnter }}\" onmouseleave=\"{{ tipLeave }}\" style=\"display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:50%; border:1px solid rgba(255,255,255,.24); color:#9a9182; font:700 8px 'Space Mono',monospace; cursor:help; flex:none\">?<\u002Fspan><\u002Fsc-if>\n                      <span style=\"font:400 10px 'Space Mono',monospace; color:#6f675b; flex:none\">{{ row.countLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                  <sc-if value=\"{{ row.isFeature }}\">\n                    <div style=\"border:1px solid rgba(255,255,255,.07); border-radius:10px; background:#17150f; overflow:hidden\">\n                      <div style=\"display:flex; align-items:center; gap:8px; padding:11px 14px; background:#1b1813; border-bottom:1px solid rgba(255,255,255,.06)\">\n                        <sc-if value=\"{{ row.diffHi }}\"><span style=\"align-self:stretch; width:3px; border-radius:2px; background:var(--acc,#86a98c); flex:none\"><\u002Fspan><\u002Fsc-if>\n                        <span style=\"flex:1; font:600 14px/1.32 'Archivo',sans-serif; color:#f3efe6\">{{ row.name }}<\u002Fspan>\n                        <sc-if value=\"{{ row.hasGloss }}\"><span onmouseenter=\"{{ row.tipEnter }}\" onmouseleave=\"{{ tipLeave }}\" onclick=\"{{ row.tipEnter }}\" style=\"display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; border:1px solid rgba(255,255,255,.28); color:#b9b1a2; font:700 10px 'Space Mono',monospace; cursor:help; flex:none\">?<\u002Fspan><\u002Fsc-if>\n                      <\u002Fdiv>\n                      <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"3\">\n                        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.04)\">\n                          <span style=\"font:600 12.5px 'Archivo',sans-serif; color:#cfc8ba\">{{ cell.trim }}<\u002Fspan>\n                          <sc-if value=\"{{ cell.std }}\"><span style=\"display:inline-flex; align-items:center; gap:5px; font:700 10px 'Space Mono',monospace; letter-spacing:.07em; text-transform:uppercase; color:#a9ccae; background:rgba(134,169,140,.14); border:1px solid rgba(134,169,140,.32); padding:4px 9px; border-radius:6px; flex:none\">✓ Standard<\u002Fspan><\u002Fsc-if>\n                          <sc-if value=\"{{ cell.opt }}\"><span style=\"display:inline-flex; align-items:center; gap:5px; font:700 10px 'Space Mono',monospace; letter-spacing:.07em; text-transform:uppercase; color:#e6c486; background:rgba(216,166,87,.12); border:1px solid rgba(216,166,87,.32); padding:4px 9px; border-radius:6px; flex:none\">Optional<\u002Fspan><\u002Fsc-if>\n                          <sc-if value=\"{{ cell.na }}\"><span style=\"font:700 10px 'Space Mono',monospace; letter-spacing:.07em; text-transform:uppercase; color:#6f675b; flex:none\">— N/A<\u002Fspan><\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ hasTip }}\">\n    <div style=\"{{ tipStyle }}\">\n      <div style=\"max-width:330px; background:#28221a; border:1px solid rgba(255,255,255,.15); border-radius:11px; padding:14px 16px; box-shadow:0 14px 44px rgba(0,0,0,.6); pointer-events:none; animation:tipin .13s ease\">\n        <div style=\"font:700 11px 'Space Mono',monospace; letter-spacing:.08em; text-transform:uppercase; color:var(--acc,#86a98c); margin-bottom:7px\">{{ tip.term }}<\u002Fdiv>\n        <div style=\"font:400 13px/1.55 'Archivo',sans-serif; color:#dcd6ca\">{{ tip.body }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;defaultView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;All features&quot;,&quot;Differences only&quot;],&quot;default&quot;:&quot;Differences only&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Sage green&quot;,&quot;Amber&quot;,&quot;Sky blue&quot;],&quot;default&quot;:&quot;Sky blue&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;showPrices&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Display&quot;}}\">\nclass Component extends DCLogic {\n  state = { selected: [0, 3, 6], mode: null, search: '', highlight: true, collapsed: {}, subCollapsed: {}, hidden: {}, panelOpen: false, tip: null, data: null, gloss: null, hgloss: null, isMobile: null };\n\n  componentDidMount() {\n    import('https://shaiss.github.io/bundled-spa/bronco-data.js')\n      .then((m) => this.setState({ data: m.DATA, gloss: m.GLOSSARY, hgloss: m.HEADER_GLOSSARY }))\n      .catch((e) => console.error('bronco-data load failed', e));\n    if (typeof window !== 'undefined') {\n      this.setState({ isMobile: this.isMobileNow() });\n      this._onResize = () => {\n        const m = this.isMobileNow();\n        if (m !== this.state.isMobile) this.setState({ isMobile: m });\n      };\n      window.addEventListener('resize', this._onResize);\n    }\n  }\n\n  componentWillUnmount() {\n    if (typeof window !== 'undefined' && this._onResize) {\n      window.removeEventListener('resize', this._onResize);\n    }\n  }\n\n  // Keep this breakpoint in sync with the @media (max-width:760px) rules.\n  isMobileNow() { return typeof window !== 'undefined' && window.innerWidth <= 760; }\n\n  accentHex() {\n    const a = this.props.accent || 'Sage green';\n    if (a === 'Amber') return '#d8a657';\n    if (a === 'Sky blue') return '#6ea0d8';\n    return '#86a98c';\n  }\n  effMode() { return this.state.mode || (this.props.defaultView === 'Differences only' ? 'diff' : 'all'); }\n  money(n) { return '$' + Number(n).toLocaleString('en-US'); }\n\n  glossFor(name) {\n    const g = this.state.gloss || [];\n    const l = name.toLowerCase();\n    for (const e of g) { if (e.keywords.some((k) => l.includes(k))) return e; }\n    return null;\n  }\n\n  showTip(e, gl) {\n    const r = e.currentTarget.getBoundingClientRect();\n    this.setState({ tip: { term: gl.term, body: gl.body, x: r.left + r.width / 2, y: r.bottom + 9 } });\n  }\n  hideTip() { if (this.state.tip) this.setState({ tip: null }); }\n\n  toggleTrim(i) {\n    this.setState((s) => {\n      const has = s.selected.includes(i);\n      return { selected: has ? s.selected.filter((x) => x !== i) : [...s.selected, i] };\n    });\n  }\n  toggleCollapse(cat) { this.setState((s) => ({ collapsed: { ...s.collapsed, [cat]: !s.collapsed[cat] } })); }\n  toggleSubCollapse(key) { this.setState((s) => ({ subCollapsed: { ...s.subCollapsed, [key]: !s.subCollapsed[key] } })); }\n  toggleHidden(key) { this.setState((s) => { const h = { ...s.hidden }; if (h[key]) delete h[key]; else h[key] = true; return { hidden: h }; }); }\n  togglePanel() { this.setState((s) => ({ panelOpen: !s.panelOpen })); }\n  closePanel() { this.setState({ panelOpen: false }); }\n  showAllSections() { this.setState({ hidden: {} }); }\n\n  renderVals() {\n    const D = this.state.data;\n    const accent = this.accentHex();\n    const tip = this.state.tip;\n    let tipStyle = null;\n    if (tip) {\n      const vw = (typeof window !== 'undefined' && window.innerWidth) || 1200;\n      const x = Math.max(185, Math.min(vw - 185, tip.x));\n      tipStyle = { position: 'fixed', left: x + 'px', top: tip.y + 'px', transform: 'translateX(-50%)', zIndex: 1000 };\n    }\n\n    const isMobile = this.state.isMobile != null ? this.state.isMobile : this.isMobileNow();\n    const isDesktop = !isMobile;\n\n    const base = {\n      isMobile, isDesktop, tableDesktop: false, tableMobile: false,\n      ready: false, notReady: true, accent, hasTip: !!tip, tipStyle,\n      tip: tip ? { term: tip.term, body: tip.body } : null,\n      tipLeave: () => this.hideTip(),\n      sourceLabel: '', allTrims: [], headers: [], rows: [],\n      hasHeaders: false, noSel: false, diffNeedsMore: false, showRows: false,\n      modeAll: true, modeAllOff: false, modeDiff: false, modeDiffOff: true,\n      hasSearch: false, search: '', countLabel: '', showPrices: true,\n      setAll: () => this.setState({ mode: 'all' }), setDiff: () => this.setState({ mode: 'diff' }),\n      onSearch: (e) => this.setState({ search: e.target.value }), clearSearch: () => this.setState({ search: '' }),\n      panelSections: [], panelOpen: false, hasHidden: false, hiddenCount: 0,\n      togglePanel: () => this.togglePanel(), closePanel: () => this.closePanel(), showAllSections: () => this.showAllSections(),\n    };\n    if (!D) return base;\n\n    const trims = D.trims;\n    const fc = D.feature_comparison;\n    const sel = this.state.selected;\n    const mode = this.effMode();\n    const q = (this.state.search || '').trim().toLowerCase();\n    const hl = this.state.highlight;\n    const showPrices = this.props.showPrices !== false;\n    const collapsed = this.state.collapsed;\n    const hg = this.state.hgloss || {};\n\n    const allTrims = trims.map((t, i) => ({\n      name: t.name, price: this.money(t.starting_price), idx: i,\n      selected: sel.includes(i), unselected: !sel.includes(i),\n      toggle: () => this.toggleTrim(i),\n    }));\n    const selOrdered = trims.map((t, i) => i).filter((i) => sel.includes(i));\n    const headers = selOrdered.map((i) => ({\n      name: trims[i].name, price: this.money(trims[i].starting_price), idx: i,\n      remove: () => this.toggleTrim(i),\n    }));\n\n    const cellOf = (code) => ({ std: code === 'S', opt: code === 'O', na: code === 'NA' });\n    const hidden = this.state.hidden || {};\n    const subColl = this.state.subCollapsed || {};\n    const rows = [];\n    const panelSections = [];\n    let totalFeat = 0, shownFeat = 0;\n\n    for (const cat of Object.keys(fc)) {\n      if (cat.charAt(0) === '_') continue;\n      const catObj = fc[cat];\n      const keys = Object.keys(catObj);\n      const isDirect = keys.length && Array.isArray(catObj[keys[0]]);\n      const subGroups = isDirect\n        ? [{ sub: null, feats: keys.map((k) => ({ name: k, arr: catObj[k] })) }]\n        : keys.map((sub) => ({ sub, feats: Object.keys(catObj[sub]).map((k) => ({ name: k, arr: catObj[sub][k] })) }));\n\n      panelSections.push({\n        cat,\n        catChecked: !hidden[cat], catUnchecked: !!hidden[cat],\n        toggle: () => this.toggleHidden(cat),\n        hasSubs: !isDirect,\n        subs: isDirect ? [] : keys.map((sub) => {\n          const checked = !hidden[cat] && !hidden[cat + '::' + sub];\n          return { label: sub, checked, unchecked: !checked, toggle: () => this.toggleHidden(cat + '::' + sub) };\n        }),\n      });\n\n      if (hidden[cat]) continue;\n\n      const visSubs = [];\n      let catVis = 0;\n      for (const sg of subGroups) {\n        const subKey = sg.sub ? cat + '::' + sg.sub : null;\n        if (subKey && hidden[subKey]) continue;\n        const vis = [];\n        for (const f of sg.feats) {\n          totalFeat++;\n          const selVals = selOrdered.map((i) => f.arr[i]);\n          const differs = sel.length > 1 && new Set(selVals).size > 1;\n          const sMatch = !q || f.name.toLowerCase().includes(q) || cat.toLowerCase().includes(q) || (sg.sub && sg.sub.toLowerCase().includes(q));\n          const modeOk = mode === 'all' || differs;\n          if (sMatch && modeOk && sel.length > 0) {\n            shownFeat++;\n            const gl = this.glossFor(f.name);\n            vis.push({\n              isFeature: true, isCategory: false, isSub: false,\n              name: f.name,\n              cells: selVals.map((code, ci) => Object.assign(cellOf(code), { trim: trims[selOrdered[ci]].name })),\n              diffHi: hl && differs, hasGloss: !!gl,\n              tipEnter: gl ? (e) => this.showTip(e, gl) : null,\n            });\n          }\n        }\n        if (vis.length) { visSubs.push({ sub: sg.sub, subKey, feats: vis }); catVis += vis.length; }\n      }\n      if (!catVis) continue;\n      const chg = hg[cat];\n      const isColl = !!collapsed[cat];\n      rows.push({\n        isCategory: true, isFeature: false, isSub: false,\n        label: cat, countLabel: catVis + (catVis === 1 ? ' feature' : ' features'),\n        chevron: isColl ? '+' : '−', hasGloss: !!chg,\n        tipEnter: chg ? (e) => this.showTip(e, chg) : null,\n        toggle: () => this.toggleCollapse(cat),\n      });\n      if (isColl) continue;\n      for (const vs of visSubs) {\n        if (vs.sub) {\n          const shg = hg[vs.sub];\n          const sCollapsed = !!subColl[vs.subKey];\n          rows.push({\n            isSub: true, isCategory: false, isFeature: false,\n            label: vs.sub, hasGloss: !!shg,\n            tipEnter: shg ? (e) => this.showTip(e, shg) : null,\n            chevron: sCollapsed ? '+' : '−',\n            countLabel: vs.feats.length + (vs.feats.length === 1 ? ' feature' : ' features'),\n            toggle: () => this.toggleSubCollapse(vs.subKey),\n          });\n          if (sCollapsed) continue;\n        }\n        for (const fr of vs.feats) rows.push(fr);\n      }\n    }\n    const hiddenCount = Object.keys(hidden).length;\n\n    const diffNeedsMore = mode === 'diff' && sel.length < 2;\n    let countLabel;\n    if (sel.length === 0) countLabel = 'No trims selected';\n    else if (mode === 'diff') countLabel = sel.length < 2 ? 'Pick 2+ trims' : shownFeat + (shownFeat === 1 ? ' difference' : ' differences');\n    else countLabel = shownFeat + ' of ' + totalFeat + ' features';\n\n    return Object.assign(base, {\n      ready: true, notReady: false, showPrices,\n      sourceLabel: 'Pricing as of ' + D.pricing_as_of,\n      allTrims, headers, rows,\n      hasHeaders: headers.length > 0, noSel: sel.length === 0,\n      tableDesktop: headers.length > 0 && isDesktop, tableMobile: headers.length > 0 && isMobile,\n      diffNeedsMore, showRows: !diffNeedsMore,\n      modeAll: mode === 'all', modeAllOff: mode !== 'all',\n      modeDiff: mode === 'diff', modeDiffOff: mode !== 'diff',\n      hasSearch: q.length > 0, search: this.state.search, countLabel,\n      panelSections, panelOpen: this.state.panelOpen, hasHidden: hiddenCount > 0, hiddenCount,\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
